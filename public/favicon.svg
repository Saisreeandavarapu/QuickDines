<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <rect width="100" height="100" rx="16" fill="#0B1F5A"/>

  <!-- Top-left QR corner block (outer ring) -->
  <rect x="10" y="10" width="34" height="34" rx="6" fill="white"/>
  <rect x="15" y="15" width="24" height="24" rx="4" fill="#0B1F5A"/>
  <rect x="20" y="20" width="14" height="14" rx="2.5" fill="white"/>

  <!-- Top-right dots (2x2 grid) -->
  <rect x="56" y="10" width="14" height="14" rx="3" fill="white"/>
  <rect x="76" y="10" width="14" height="14" rx="3" fill="white"/>
  <rect x="56" y="28" width="6" height="6" rx="1.5" fill="white"/>
  <rect x="66" y="28" width="6" height="6" rx="1.5" fill="white"/>
  <rect x="76" y="28" width="14" height="6" rx="1.5" fill="white"/>

  <!-- Bottom-left dots (2x2 grid) -->
  <rect x="10" y="56" width="14" height="14" rx="3" fill="white"/>
  <rect x="10" y="76" width="14" height="14" rx="3" fill="white"/>
  <rect x="28" y="56" width="6" height="6" rx="1.5" fill="white"/>
  <rect x="28" y="66" width="6" height="6" rx="1.5" fill="white"/>
  <rect x="28" y="76" width="6" height="14" rx="1.5" fill="white"/>

  <!-- Center dot pattern -->
  <rect x="46" y="46" width="6" height="6" rx="1.5" fill="white"/>
  <rect x="56" y="46" width="6" height="6" rx="1.5" fill="white"/>
  <rect x="66" y="46" width="14" height="14" rx="3" fill="white"/>
  <rect x="46" y="56" width="6" height="6" rx="1.5" fill="white"/>
  <rect x="46" y="66" width="6" height="6" rx="1.5" fill="white"/>
  <rect x="56" y="66" width="6" height="6" rx="1.5" fill="white"/>
  <rect x="66" y="66" width="6" height="6" rx="1.5" fill="white"/>
  <rect x="76" y="56" width="14" height="34" rx="3" fill="white"/>
  <rect x="56" y="76" width="14" height="14" rx="3" fill="white"/>
</svg>